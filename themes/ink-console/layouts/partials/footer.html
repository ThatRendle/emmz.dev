<footer class="footer" role="contentinfo">
  <div class="container footer-grid">
    <p class="footer-credit">
      &copy; {{ now.Year }} {{ or site.Params.author site.Title }}{{ with site.Params.footerNote }} · {{ . }}{{ end }}
    </p>
    {{- with site.Menus.footer }}
    <nav class="footer-links" aria-label="Footer links">
      {{- range . }}
      <a href="{{ .URL }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
      {{- end }}
    </nav>
    {{- end }}
  </div>
</footer>
